services:
  multimodal-rag:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env                      # Loads all API keys from your .env file
    volumes:
      - ./data:/app/data          # Your input files persist on your machine
      - ./chroma_store:/app/chroma_store  # Vector DB persists on your machine
    restart: unless-stopped       # Auto-restart on crash, stop on explicit docker stop
